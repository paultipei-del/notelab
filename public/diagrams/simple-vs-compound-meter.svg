<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 760 360" role="img" aria-labelledby="t d">
  <title id="t">Simple vs compound meter subdivision</title>
  <desc id="d">Two staves compared: 4/4 time with quarter-note beats each subdividing into two eighths (simple); 6/8 time with dotted-quarter beats each subdividing into three eighths (compound).</desc>
  <style>
    .staff { stroke: #1a1a18; stroke-width: 1; }
    .clef  { font: 500 46px "Cormorant Garamond", Georgia, serif; fill: #1a1a18; }
    .meter { font: 600 24px "Cormorant Garamond", Georgia, serif; fill: #1a1a18; text-anchor: middle; }
    .beat-lbl { font: 600 11px system-ui, sans-serif; fill: #a03f2e; text-anchor: middle; text-transform: uppercase; letter-spacing: 0.1em; }
    .sub   { font: 300 12px system-ui, sans-serif; fill: #7A7060; text-anchor: middle; font-style: italic; }
    .note  { fill: #1a1a18; }
    .stem  { stroke: #1a1a18; stroke-width: 1.2; }
    .beam  { stroke: #1a1a18; stroke-width: 3; fill: none; }
    .title { font: 500 18px "Cormorant Garamond", Georgia, serif; fill: #1a1a18; }
  </style>

  <!-- SIMPLE 4/4 -->
  <text class="title" x="40" y="38">Simple meter — 4/4</text>

  <!-- 4/4 staff -->
  <line class="staff" x1="120" y1="70"  x2="720" y2="70"/>
  <line class="staff" x1="120" y1="84"  x2="720" y2="84"/>
  <line class="staff" x1="120" y1="98"  x2="720" y2="98"/>
  <line class="staff" x1="120" y1="112" x2="720" y2="112"/>
  <line class="staff" x1="120" y1="126" x2="720" y2="126"/>
  <text class="clef" x="130" y="122">𝄞</text>
  <text class="meter" x="210" y="94">4</text>
  <text class="meter" x="210" y="122">4</text>

  <!-- 4 beats each with 2 beamed eighths — place at x=280,380,480,580 -->
  <g>
    <!-- Beat 1: two eighths at 270 and 310 on B4 (y=98) -->
    <ellipse class="note" cx="270" cy="98" rx="6" ry="4" transform="rotate(-18 270 98)"/>
    <ellipse class="note" cx="310" cy="98" rx="6" ry="4" transform="rotate(-18 310 98)"/>
    <line class="stem" x1="275" y1="98" x2="275" y2="62"/>
    <line class="stem" x1="315" y1="98" x2="315" y2="62"/>
    <line class="beam" x1="275" y1="62" x2="315" y2="62"/>
    <text class="beat-lbl" x="290" y="160">Beat 1</text>
    <text class="sub" x="290" y="180">1 – &amp;</text>
  </g>
  <g>
    <ellipse class="note" cx="370" cy="98" rx="6" ry="4" transform="rotate(-18 370 98)"/>
    <ellipse class="note" cx="410" cy="98" rx="6" ry="4" transform="rotate(-18 410 98)"/>
    <line class="stem" x1="375" y1="98" x2="375" y2="62"/>
    <line class="stem" x1="415" y1="98" x2="415" y2="62"/>
    <line class="beam" x1="375" y1="62" x2="415" y2="62"/>
    <text class="beat-lbl" x="390" y="160">Beat 2</text>
    <text class="sub" x="390" y="180">2 – &amp;</text>
  </g>
  <g>
    <ellipse class="note" cx="470" cy="98" rx="6" ry="4" transform="rotate(-18 470 98)"/>
    <ellipse class="note" cx="510" cy="98" rx="6" ry="4" transform="rotate(-18 510 98)"/>
    <line class="stem" x1="475" y1="98" x2="475" y2="62"/>
    <line class="stem" x1="515" y1="98" x2="515" y2="62"/>
    <line class="beam" x1="475" y1="62" x2="515" y2="62"/>
    <text class="beat-lbl" x="490" y="160">Beat 3</text>
    <text class="sub" x="490" y="180">3 – &amp;</text>
  </g>
  <g>
    <ellipse class="note" cx="570" cy="98" rx="6" ry="4" transform="rotate(-18 570 98)"/>
    <ellipse class="note" cx="610" cy="98" rx="6" ry="4" transform="rotate(-18 610 98)"/>
    <line class="stem" x1="575" y1="98" x2="575" y2="62"/>
    <line class="stem" x1="615" y1="98" x2="615" y2="62"/>
    <line class="beam" x1="575" y1="62" x2="615" y2="62"/>
    <text class="beat-lbl" x="590" y="160">Beat 4</text>
    <text class="sub" x="590" y="180">4 – &amp;</text>
  </g>

  <!-- COMPOUND 6/8 -->
  <text class="title" x="40" y="230">Compound meter — 6/8</text>

  <!-- 6/8 staff -->
  <line class="staff" x1="120" y1="260" x2="720" y2="260"/>
  <line class="staff" x1="120" y1="274" x2="720" y2="274"/>
  <line class="staff" x1="120" y1="288" x2="720" y2="288"/>
  <line class="staff" x1="120" y1="302" x2="720" y2="302"/>
  <line class="staff" x1="120" y1="316" x2="720" y2="316"/>
  <text class="clef" x="130" y="312">𝄞</text>
  <text class="meter" x="210" y="284">6</text>
  <text class="meter" x="210" y="312">8</text>

  <!-- 2 beats, each 3 beamed eighths -->
  <g>
    <ellipse class="note" cx="290" cy="288" rx="6" ry="4" transform="rotate(-18 290 288)"/>
    <ellipse class="note" cx="340" cy="288" rx="6" ry="4" transform="rotate(-18 340 288)"/>
    <ellipse class="note" cx="390" cy="288" rx="6" ry="4" transform="rotate(-18 390 288)"/>
    <line class="stem" x1="295" y1="288" x2="295" y2="252"/>
    <line class="stem" x1="345" y1="288" x2="345" y2="252"/>
    <line class="stem" x1="395" y1="288" x2="395" y2="252"/>
    <line class="beam" x1="295" y1="252" x2="395" y2="252"/>
    <text class="beat-lbl" x="340" y="350">Beat 1 (ta-ki-ta)</text>
  </g>
  <g>
    <ellipse class="note" cx="490" cy="288" rx="6" ry="4" transform="rotate(-18 490 288)"/>
    <ellipse class="note" cx="540" cy="288" rx="6" ry="4" transform="rotate(-18 540 288)"/>
    <ellipse class="note" cx="590" cy="288" rx="6" ry="4" transform="rotate(-18 590 288)"/>
    <line class="stem" x1="495" y1="288" x2="495" y2="252"/>
    <line class="stem" x1="545" y1="288" x2="545" y2="252"/>
    <line class="stem" x1="595" y1="288" x2="595" y2="252"/>
    <line class="beam" x1="495" y1="252" x2="595" y2="252"/>
    <text class="beat-lbl" x="540" y="350">Beat 2 (ta-ki-ta)</text>
  </g>
</svg>
