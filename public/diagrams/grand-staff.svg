<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 600 360" role="img" aria-labelledby="t d">
  <title id="t">The grand staff</title>
  <desc id="d">Treble and bass staves joined by a brace, with middle C shown on both: a ledger line below the treble and a ledger line above the bass.</desc>
  <style>
    .staff  { stroke: #1a1a18; stroke-width: 1; }
    .ledger { stroke: #1a1a18; stroke-width: 1; }
    .brace  { stroke: #1a1a18; stroke-width: 2; fill: none; }
    .bar    { stroke: #1a1a18; stroke-width: 1.25; }
    .clef   { font: 500 64px "Cormorant Garamond", Georgia, serif; fill: #1a1a18; }
    .lbl    { font: 300 13px system-ui, sans-serif; fill: #7A7060; font-style: italic; }
    .mark   { font: 500 14px system-ui, sans-serif; fill: #a03f2e; }
    .note   { fill: #1a1a18; }
  </style>

  <!-- Brace (simple bracket) -->
  <path class="brace" d="M 80 80 Q 68 90 68 135 Q 68 160 80 170 Q 68 180 68 205 Q 68 250 80 260"/>
  <!-- Start barline -->
  <line class="bar" x1="90" y1="80" x2="90" y2="260"/>
  <!-- End barline -->
  <line class="bar" x1="540" y1="80" x2="540" y2="260"/>

  <!-- Treble staff (5 lines, 8px apart) -->
  <line class="staff" x1="90" y1="80"  x2="540" y2="80"/>
  <line class="staff" x1="90" y1="96"  x2="540" y2="96"/>
  <line class="staff" x1="90" y1="112" x2="540" y2="112"/>
  <line class="staff" x1="90" y1="128" x2="540" y2="128"/>
  <line class="staff" x1="90" y1="144" x2="540" y2="144"/>

  <!-- Bass staff (5 lines, 8px apart) -->
  <line class="staff" x1="90" y1="196" x2="540" y2="196"/>
  <line class="staff" x1="90" y1="212" x2="540" y2="212"/>
  <line class="staff" x1="90" y1="228" x2="540" y2="228"/>
  <line class="staff" x1="90" y1="244" x2="540" y2="244"/>
  <line class="staff" x1="90" y1="260" x2="540" y2="260"/>

  <!-- Treble clef (glyph) -->
  <text class="clef" x="100" y="144">𝄞</text>
  <!-- Bass clef -->
  <text class="clef" x="100" y="252">𝄢</text>

  <!-- Middle C on treble (ledger line below staff) -->
  <line class="ledger" x1="270" y1="160" x2="298" y2="160"/>
  <ellipse class="note" cx="284" cy="160" rx="7" ry="5" transform="rotate(-18 284 160)"/>
  <text class="mark" x="260" y="184">middle C</text>

  <!-- Middle C on bass (ledger line above staff) -->
  <line class="ledger" x1="380" y1="180" x2="408" y2="180"/>
  <ellipse class="note" cx="394" cy="180" rx="7" ry="5" transform="rotate(-18 394 180)"/>
  <text class="mark" x="370" y="174">middle C</text>

  <!-- Section labels -->
  <text class="lbl" x="170" y="55">Treble (G clef)</text>
  <text class="lbl" x="170" y="300">Bass (F clef)</text>
</svg>
