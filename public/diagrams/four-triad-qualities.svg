<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 300" role="img" aria-labelledby="t d">
  <title id="t">The four triad qualities built on C</title>
  <desc id="d">A single treble staff showing four triads built on C — major, minor, diminished, augmented — each with its interval structure labeled below.</desc>
  <style>
    .staff { stroke: #1a1a18; stroke-width: 1; }
    .clef  { font: 500 64px "Cormorant Garamond", Georgia, serif; fill: #1a1a18; }
    .note  { fill: #1a1a18; }
    .acc   { font: 500 18px system-ui, sans-serif; fill: #1a1a18; }
    .lbl   { font: 500 15px "Cormorant Garamond", Georgia, serif; fill: #1a1a18; text-anchor: middle; }
    .intv  { font: 300 12px system-ui, sans-serif; fill: #7A7060; text-anchor: middle; font-style: italic; }
    .ledger { stroke: #1a1a18; stroke-width: 1; }
  </style>

  <!-- Treble staff lines -->
  <line class="staff" x1="30" y1="80"  x2="700" y2="80"/>
  <line class="staff" x1="30" y1="96"  x2="700" y2="96"/>
  <line class="staff" x1="30" y1="112" x2="700" y2="112"/>
  <line class="staff" x1="30" y1="128" x2="700" y2="128"/>
  <line class="staff" x1="30" y1="144" x2="700" y2="144"/>

  <!-- Treble clef -->
  <text class="clef" x="40" y="144">𝄞</text>

  <!-- Four triads horizontally spaced -->
  <!-- Each triad has three notes: C4 (below staff w/ ledger), E4 (bottom line), G4 (2nd line)
       Then variants adjust E and G with accidentals -->

  <!-- C major: C-E-G, x=180 -->
  <g>
    <!-- C4 ledger line -->
    <line class="ledger" x1="163" y1="160" x2="197" y2="160"/>
    <!-- C4 notehead (below ledger at y=160) -->
    <ellipse class="note" cx="180" cy="160" rx="8" ry="6" transform="rotate(-18 180 160)"/>
    <!-- E4 on bottom line (y=144) -->
    <ellipse class="note" cx="180" cy="144" rx="8" ry="6" transform="rotate(-18 180 144)"/>
    <!-- G4 on 2nd line from bottom (y=128) -->
    <ellipse class="note" cx="180" cy="128" rx="8" ry="6" transform="rotate(-18 180 128)"/>
    <text class="lbl"  x="180" y="210">C major</text>
    <text class="intv" x="180" y="228">M3 + m3</text>
  </g>

  <!-- C minor: C-E♭-G, x=320 -->
  <g>
    <line class="ledger" x1="303" y1="160" x2="337" y2="160"/>
    <ellipse class="note" cx="320" cy="160" rx="8" ry="6" transform="rotate(-18 320 160)"/>
    <ellipse class="note" cx="320" cy="144" rx="8" ry="6" transform="rotate(-18 320 144)"/>
    <text class="acc" x="295" y="150">♭</text>
    <ellipse class="note" cx="320" cy="128" rx="8" ry="6" transform="rotate(-18 320 128)"/>
    <text class="lbl"  x="320" y="210">C minor</text>
    <text class="intv" x="320" y="228">m3 + M3</text>
  </g>

  <!-- C diminished: C-E♭-G♭, x=460 -->
  <g>
    <line class="ledger" x1="443" y1="160" x2="477" y2="160"/>
    <ellipse class="note" cx="460" cy="160" rx="8" ry="6" transform="rotate(-18 460 160)"/>
    <ellipse class="note" cx="460" cy="144" rx="8" ry="6" transform="rotate(-18 460 144)"/>
    <text class="acc" x="435" y="150">♭</text>
    <ellipse class="note" cx="460" cy="128" rx="8" ry="6" transform="rotate(-18 460 128)"/>
    <text class="acc" x="435" y="134">♭</text>
    <text class="lbl"  x="460" y="210">C diminished</text>
    <text class="intv" x="460" y="228">m3 + m3 (tritone)</text>
  </g>

  <!-- C augmented: C-E-G#, x=600 -->
  <g>
    <line class="ledger" x1="583" y1="160" x2="617" y2="160"/>
    <ellipse class="note" cx="600" cy="160" rx="8" ry="6" transform="rotate(-18 600 160)"/>
    <ellipse class="note" cx="600" cy="144" rx="8" ry="6" transform="rotate(-18 600 144)"/>
    <ellipse class="note" cx="600" cy="128" rx="8" ry="6" transform="rotate(-18 600 128)"/>
    <text class="acc" x="575" y="134">♯</text>
    <text class="lbl"  x="600" y="210">C augmented</text>
    <text class="intv" x="600" y="228">M3 + M3</text>
  </g>
</svg>
